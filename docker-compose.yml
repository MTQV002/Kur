services:
  # ──── Apache Polaris (Iceberg REST Catalog) ────
  polaris:
    image: apache/polaris:latest
    ports:
      - "8181:8181"
    environment:
      - POLARIS_BOOTSTRAP_CREDENTIALS=POLARIS,polaris,polaris_secret
      - POLARIS_FEATURES_SUPPORTED_CATALOG_STORAGE_TYPES=FILE,S3,GCS,AZURE

  # ──── Observability (Arize Phoenix) ────
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317" # OTLP GRPC
    environment:
      - PHOENIX_PORT=6006
      - PHOENIX_GRPC_PORT=4317

  # ──── Kur API (FastAPI + LangGraph + DuckDB) ────
  kur-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DUCKDB_PATH=/app/data/kur.db
    depends_on:
      - trino
    volumes:
      - kur_data:/app/data

  # ──── Trino (single-node query engine for testing) ────
  trino:
    image: trinodb/trino:latest
    ports:
      - "8082:8080"
    volumes:
      - ./trino/catalog/memory.properties:/etc/trino/catalog/memory.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/info >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──── Kur Web UI (Vite React — production build) ────
  kur-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "8501:80"
    depends_on:
      - kur-api

volumes:
  kur_data:
